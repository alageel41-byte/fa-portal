<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FA Admin | مولد الأخبار</title>
<style>
:root{--navy:#06152b;--blue:#0a2f5e;--gold:#d4af7a;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;background:linear-gradient(180deg,#fff,#f8f9fc);color:var(--ink);line-height:1.7}
.container{width:min(900px,92vw);margin:auto}
.top{background:var(--navy);color:#dbeafe;padding:12px 0;font-size:13px}
.header{padding:28px 0}.header h1{margin:0;color:var(--blue);font-size:34px}.header p{margin:6px 0 0;color:var(--muted)}
.card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:22px;margin:16px 0;box-shadow:0 18px 50px rgba(15,23,42,.07)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}
label{display:block;font-weight:850;margin:0 0 6px;color:#334155}
input,textarea,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;font:inherit}
textarea{min-height:150px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
button{border:0;border-radius:14px;padding:12px 16px;font-weight:950;cursor:pointer}
.primary{background:var(--gold);color:#111827}.blue{background:var(--blue);color:white}.ghost{background:#eef2f7;color:#334155}
.news-item{border-bottom:1px solid var(--line);padding:12px 0}.news-item b{display:block}
pre{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;border-radius:18px;padding:16px;direction:ltr;text-align:left;max-height:320px;overflow:auto}
@media(max-width:720px){.grid{grid-template-columns:1fr}.header h1{font-size:26px}}
</style>
</head>
<body>
<div class="top"><div class="container">FA Portal v4.0 — Phase 2A</div></div>
<header class="container header">
  <h1>FA Admin</h1>
  <p>مولد ملف news.json من الجوال</p>
</header>

<main class="container">
<section class="card">
  <h2>إضافة خبر</h2>
  <div class="grid">
    <div><label>العنوان</label><input id="title" placeholder="عنوان الخبر"></div>
    <div><label>التصنيف</label><select id="category"><option>السعودية</option><option>العالم</option><option>الاقتصاد</option><option>FA SPORTS</option><option>التعليم</option><option>الصحة</option><option>الطقس</option><option>التقنية</option></select></div>
    <div class="full"><label>الملخص</label><input id="summary" placeholder="ملخص قصير يظهر في الصفحة"></div>
    <div class="full"><label>نص الخبر</label><textarea id="content" placeholder="نص الخبر الكامل"></textarea></div>
    <div><label>المصدر</label><input id="source" value="FA Media Solutions"></div>
    <div><label>الصورة اختياري</label><input id="image" placeholder="رابط الصورة"></div>
    <div><label>مميز؟</label><select id="featured"><option value="false">لا</option><option value="true">نعم</option></select></div>
    <div><label>الحالة</label><select id="status"><option value="published">منشور</option><option value="draft">مسودة</option></select></div>
  </div>
  <div class="actions">
    <button class="primary" onclick="addNews()">إضافة للملف</button>
    <button class="blue" onclick="downloadJSON()">تحميل news.json</button>
    <button class="ghost" onclick="clearAll()">حذف الكل</button>
  </div>
</section>

<section class="card">
  <h2>الأخبار الحالية</h2>
  <div id="list">لا توجد أخبار بعد.</div>
</section>

<section class="card">
  <h2>معاينة JSON</h2>
  <pre id="jsonPreview">[]</pre>
</section>
</main>

<script>
let news = JSON.parse(localStorage.getItem("fa_news_builder") || "[]");

function save(){localStorage.setItem("fa_news_builder", JSON.stringify(news)); render();}
function id(){return "FA-" + Date.now();}
function today(){return new Date().toISOString().slice(0,10);}

function addNews(){
  const item = {
    id:id(),
    title:document.getElementById("title").value.trim(),
    category:document.getElementById("category").value,
    summary:document.getElementById("summary").value.trim(),
    content:document.getElementById("content").value.trim(),
    date:today(),
    author:"Fahad ALageel",
    source:document.getElementById("source").value.trim() || "FA Media Solutions",
    status:document.getElementById("status").value,
    featured:document.getElementById("featured").value === "true",
    image:document.getElementById("image").value.trim()
  };
  if(!item.title || !item.summary || !item.content){alert("أكمل العنوان والملخص ونص الخبر");return;}
  news.unshift(item);
  document.getElementById("title").value="";
  document.getElementById("summary").value="";
  document.getElementById("content").value="";
  document.getElementById("image").value="";
  save();
}

function removeNews(i){news.splice(i,1);save();}
function clearAll(){if(confirm("حذف جميع الأخبار؟")){news=[];save();}}

function render(){
  document.getElementById("jsonPreview").textContent = JSON.stringify(news,null,2);
  const list = document.getElementById("list");
  if(!news.length){list.textContent="لا توجد أخبار بعد.";return;}
  list.innerHTML = news.map((n,i)=>`
    <div class="news-item">
      <b>${n.title}</b>
      <span>${n.category} — ${n.date}</span>
      <div class="actions"><button class="ghost" onclick="removeNews(${i})">حذف</button></div>
    </div>
  `).join("");
}

function downloadJSON(){
  const blob = new Blob([JSON.stringify(news,null,2)], {type:"application/json;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "news.json";
  document.body.appendChild(a);
  a.click();
  a.remove();
}
render();
</script>
</body>
</html>

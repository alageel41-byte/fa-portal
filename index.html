<meta name="theme-color" content="#06152b">
</head>
<body>

<div id="grid-container">
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyCybhy84-1-Bkbooqq7lWyszVkOAkkGGAU",
        projectId: "fa-media-portal"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    async function loadNews() {
        const grid = document.getElementById("grid-container");
        if (!grid) return;
        
        try {
            const q = query(collection(db, "news"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            
            grid.innerHTML = snap.docs.map(doc => {
                const n = doc.data();
                return `
                    <div class="news-item" style="border-bottom:1px solid #eee; padding:15px;">
                        <h3>${n.title || ''}</h3>
                        <p>${n.summary || ''}</p>
                        <small>${n.category || ''}</small>
                    </div>`;
            }).join("");
        } catch(e) {
            console.error("خطأ في التحميل:", e);
        }
    }
    
    loadNews();
</script>
</body>
</html>

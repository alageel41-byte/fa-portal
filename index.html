<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FA Media Solutions</title>
    <style>
        :root { --navy: #06152b; --gold: #d4af7a; }
        body { font-family: Tahoma, Arial, sans-serif; background: #f8f9fc; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 40px 0; color: var(--navy); }
        
        /* نظام الشبكة لجعل الأخبار في مكانها الصحيح */
        .news-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 30px; 
            max-width: 1200px; 
            margin: auto; 
        }
        
        /* تصميم البطاقة الاحترافي */
        .card { 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            border: 1px solid #eee;
            transition: transform 0.3s;
        }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 20px; }
        .card h3 { color: var(--navy); margin: 0 0 10px 0; }
        .location { color: var(--gold); font-weight: bold; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>FA Media Solutions</h1>
    </div>

    <div id="news-container" class="news-grid">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
        
        const db = getFirestore(initializeApp({ apiKey: "AIzaSyCybhy84-1-Bkbooqq7lWyszVkOAkkGGAU", projectId: "fa-media-portal" }));

        async function loadNews() {
            const container = document.getElementById("news-container");
            const q = query(collection(db, "news"), orderBy("date", "desc"));
            const snap = await getDocs(q);
            
            if(snap.empty) { container.innerHTML = "<p style='text-align:center'>لا توجد أخبار حالياً.</p>"; return; }
            
            container.innerHTML = snap.docs.map(d => {
                const n = d.data();
                return `
                <div class="card">
                    ${n.image ? `<img src="${n.image}" alt="صورة الخبر">` : ''}
                    <div class="card-content">
                        <h3>${n.title || 'بدون عنوان'}</h3>
                        <p class="location">📍 ${n.location || 'غير محدد'}</p>
                        <p>${n.summary || ''}</p>
                    </div>
                </div>`;
            }).join("");
        }
        loadNews();
    </script>
</body>
</html>

<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FA Media Solutions | Master Edition</title>
<meta name="description" content="منصة إعلام رقمي مستقلة بهوية بصرية احترافية.">
<style>
    body { background-color: #f8f9fc; color: #0f172a; font-family: system-ui, sans-serif; margin: 0; }
    .container { max-width: 1200px; margin: auto; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .card { background: #fff; padding: 20px; border-bottom: 4px solid #d4af7a; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    h1 { color: #0a2f5e; border-bottom: 2px solid #d4af7a; padding-bottom: 10px; }
</style>
</head>
<body>
    <div class="container">
        <h1>FA Media Solutions</h1>
        <div id="grid-container" class="grid"></div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
        const db = getFirestore(initializeApp({ apiKey: "AIzaSyCybhy84-1-Bkbooqq7lWyszVkOAkkGGAU", projectId: "fa-media-portal" }));
        async function load() {
            const snap = await getDocs(query(collection(db, "news"), orderBy("createdAt", "desc")));
            document.getElementById("grid-container").innerHTML = snap.docs.map(doc => {
                const n = doc.data();
                return `<div class="card"><small style="color:#d4af7a">${n.category||''}</small><h3>${n.title||''}</h3><p>${n.summary||''}</p></div>`;
            }).join("");
        }
        load();
    </script>
</body>
</html>

<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FA Media Solutions | Official Portal</title>
<style>
    /* تأكد من وجود معرف grid-container في تصميمك للمكان الذي تعرض فيه الأخبار */
    #grid-container { display: grid; gap: 20px; padding: 20px; }
</style>
</head>
<body>

    <div id="grid-container">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCybhy84-1-Bkbooqq7lWyszVkOAkkGGAU",
            projectId: "fa-media-portal"
        }));

        async function init() {
            const grid = document.getElementById("grid-container");
            if (!grid) return;
            try {
                const snap = await getDocs(query(collection(db, "news"), orderBy("createdAt", "desc")));
                grid.innerHTML = snap.docs.map(doc => {
                    const n = doc.data();
                    return `
                        <div class="news-item">
                            <h3>${n.title || ''}</h3>
                            <p>${n.summary || ''}</p>
                        </div>`;
                }).join("");
            } catch(e) { console.error(e); }
        }
        init();
    </script>
</body>
</html>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    
    const db = getFirestore(initializeApp({ 
        apiKey: "AIzaSyCybhy84-1-Bkbooqq7lWyszVkOAkkGGAU", 
        projectId: "fa-media-portal" 
    }));

    // دالة تحديث الواجهة بالمقالات من Firebase
    async function initPortal() {
        // تأكد أن مكان عرض الأخبار في تصميمك يحمل الـ id التالي: fa-news-json-grid أو grid-container
        const grid = document.getElementById("fa-news-json-grid") || document.getElementById("grid-container"); 
        if (!grid) return;
        
        try {
            const snap = await getDocs(query(collection(db, "news"), orderBy("createdAt", "desc")));
            grid.innerHTML = snap.docs.map(doc => {
                const n = doc.data();
                return `
                    <div class="news-card fa-json-news-card">
                        <span class="tag fa-json-news-tag">${n.category || 'خبر'}</span>
                        <h3>${n.title || ''}</h3>
                        <p class="fa-json-news-meta">${n.summary || ''}</p>
                    </div>`;
            }).join("");
        } catch (e) {
            console.error("تعذر جلب الأخبار:", e);
        }
    }
    
    initPortal();
</script>

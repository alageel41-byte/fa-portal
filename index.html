<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <title>FA Media Solutions</title>
    <style>
        :root { --navy: #06152b; --gold: #d4af7a; }
        body { font-family: Tahoma; background: #f4f4f9; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 15px; border-top: 5px solid var(--navy); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .card h3 { color: var(--navy); }
        .location { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>
    <h1 style="text-align:center">أحدث الأخبار</h1>
    <div id="news-container" class="grid">جاري تحميل الأخبار...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
        
        const db = getFirestore(initializeApp({ apiKey: "AIzaSyCybhy84-1-Bkbooqq7lWyszVkOAkkGGAU", projectId: "fa-media-portal" }));

        async function fetchNews() {
            const q = query(collection(db, "news"), orderBy("date", "desc"));
            const snap = await getDocs(q);
            const container = document.getElementById("news-container");
            
            if(snap.empty) { container.innerHTML = "لا توجد أخبار حالياً."; return; }
            
            container.innerHTML = snap.docs.map(d => {
                const n = d.data();
                return `
                <div class="card">
                    ${n.image ? `<img src="${n.image}" alt="خبر">` : ''}
                    <h3>${n.title || 'بدون عنوان'}</h3>
                    <p class="location">📍 ${n.location || 'غير محدد'}</p>
                    <p>${n.summary || ''}</p>
                </div>`;
            }).join("");
        }
        fetchNews();
    </script>
</body>
</html>

<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>FA Media Solutions | Master Edition</title>
    <meta name="description" content="منصة إعلام رقمي مستقلة بهوية بصرية احترافية.">
    <meta name="theme-color" content="#0a2f5e">
    <link rel="canonical" href="https://fahadalageel.com/">
    <meta property="og:title" content="FA Media Solutions | Master Edition">
    <meta property="og:description" content="منصة إعلام رقمي مستقلة بهوية بصرية احترافية.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        body { background-color: #f8f9fc; color: #0f172a; font-family: system-ui, -apple-system, sans-serif; margin: 0; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .header-area { padding-bottom: 20px; border-bottom: 2px solid #d4af7a; margin-bottom: 30px; }
        h1 { color: #0a2f5e; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #fff; padding: 20px; border-bottom: 4px solid #d4af7a; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .category-tag { color: #d4af7a; font-weight: bold; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-area">
            <h1>FA Media Solutions</h1>
        </div>
        <div id="grid-container" class="grid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
        
        const db = getFirestore(initializeApp({ 
            apiKey: "AIzaSyCybhy84-1-Bkbooqq7lWyszVkOAkkGGAU", 
            projectId: "fa-media-portal" 
        }));

        async function loadMasterEdition() {
            const grid = document.getElementById("grid-container");
            try {
                const snap = await getDocs(query(collection(db, "news"), orderBy("createdAt", "desc")));
                grid.innerHTML = snap.docs.map(doc => {
                    const n = doc.data();
                    return `
                        <div class="card">
                            <div class="category-tag">${n.category || 'أخبار'}</div>
                            <h3>${n.title || 'بدون عنوان'}</h3>
                            <p>${n.summary || ''}</p>
                        </div>`;
                }).join("");
            } catch(e) {
                console.error("خطأ في الاتصال:", e);
                grid.innerHTML = "<p>جاري تحديث البيانات...</p>";
            }
        }
        loadMasterEdition();
    </script>
</body>
</html>

<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FA Admin | إدارة المنصة</title>
<style>
:root{--navy:#06152b;--blue:#0a2f5e;--gold:#d4af7a;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--ok:#15803d;--bad:#b91c1c}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;background:linear-gradient(180deg,#fff,#f8f9fc);color:var(--ink);line-height:1.7}
.container{width:min(900px,92vw);margin:auto}
.top{background:var(--navy);color:#dbeafe;padding:12px 0;font-size:13px}.header{padding:28px 0}.header h1{margin:0;color:var(--blue);font-size:34px}.header p{margin:6px 0 0;color:var(--muted)}
.card{background:rgba(255, 255, 255, 0.9);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:24px;padding:22px;margin:16px 0;box-shadow:0 18px 50px rgba(15,23,42,.07)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}label{display:block;font-weight:850;margin:0 0 6px;color:#334155}
input,textarea,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;font:inherit}textarea{min-height:150px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}button{border:0;border-radius:14px;padding:12px 16px;font-weight:950;cursor:pointer}.primary{background:var(--gold);color:#111827}.blue{background:var(--blue);color:white}.ghost{background:#eef2f7;color:#334155}.danger{background:#fee2e2;color:#991b1b}
.news-item{border-bottom:1px solid var(--line);padding:12px 0}.news-item b{display:block}.status{border-radius:14px;padding:12px 14px;margin-top:12px;background:#eef2f7;color:#334155}.status.ok{background:#dcfce7;color:var(--ok)}.status.bad{background:#fee2e2;color:var(--bad)}
pre{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;border-radius:18px;padding:16px;direction:ltr;text-align:left;max-height:320px;overflow:auto}
@media(max-width:720px){.grid{grid-template-columns:1fr}.header h1{font-size:26px}}
</style>
</head>
<body>
<div class="top"><div class="container">FA Portal v3.1 — Event Engine (LOCKED)</div></div>
<header class="container header"><h1>FA Admin</h1><p>إدارة محرك الأحداث والنشر المباشر إلى Firebase</p></header>
<main class="container">
<section class="card"><h2>إضافة حدث جديد</h2><div class="grid">
<div><label>العنوان</label><input id="title" placeholder="عنوان الحدث"></div>
<div><label>التصنيف</label><select id="category"><option>FA SPORTS</option><option>السعودية</option><option>العالم</option><option>الاقتصاد</option><option>التعليم</option><option>الصحة</option><option>الطقس</option><option>التقنية</option></select></div>
<div class="full"><label>الملخص</label><input id="summary" placeholder="ملخص قصير يظهر في الصفحة"></div>
<div class="full"><label>نص الحدث</label><textarea id="content" placeholder="نص الحدث الكامل"></textarea></div>
<div><label>المصدر</label><input id="source" value="FA Media Solutions"></div><div><label>الصورة اختياري</label><input id="image" placeholder="رابط الصورة"></div>
<div><label>مميز؟</label><select id="featured"><option value="false">لا</option><option value="true">نعم</option></select></div>
<div><label>الحالة</label><select id="status"><option value="published">منشور</option><option value="draft">مسودة</option></select></div>
</div><div class="actions"><button class="primary" id="publishBtn">تسجيل في محرك الأحداث</button><button class="blue" id="refreshBtn">تحديث القائمة</button><button class="ghost" id="clearFormBtn">تفريغ النموذج</button></div><div id="statusBox" class="status">يتم التحقق من الصلاحيات...</div></section>
<section class="card"><h2>الأحداث المسجلة (Events)</h2><div id="list">جاري التحقق من الهوية...</div></section>
<section class="card"><h2>معاينة آخر البيانات</h2><pre id="jsonPreview">[]</pre></section>
</main>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCybhy84-1-Bkbooqq7lWyszVkOAkkGGAU",
    authDomain: "fa-media-portal.firebaseapp.com",
    projectId: "fa-media-portal",
    storageBucket: "fa-media-portal.firebasestorage.app",
    messagingSenderId: "817175807213",
    appId: "1:817175807213:web:eda206611dd78ce89038e4"
};

const app = initializeApp(firebaseConfig); 
const db = getFirestore(app); 
const auth = getAuth(app);
const $ = id => document.getElementById(id);

function today(){return new Date().toISOString().slice(0,10)}
function status(message,type=""){const box=$("statusBox");box.textContent=message;box.className="status "+type}
function clearForm(){["title","summary","content","image"].forEach(id=>$(id).value="");$("source").value="FA Media Solutions";$("featured").value="false";$("status").value="published"}
function escapeHTML(v){return String(v||"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[ch]||ch))}

function itemFromForm(){
    return {
        title:$("title").value.trim(),
        category:$("category").value,
        summary:$("summary").value.trim(),
        content:$("content").value.trim(),
        date:today(),
        author:"Fahad ALageel",
        source:$("source").value.trim()||"FA Media Solutions",
        status:$("status").value,
        published:$("status").value==="published",
        featured:$("featured").value==="true",
        image:$("image").value.trim(),
        createdAt:serverTimestamp()
    }
}

async function addEvent() {
    const item = itemFromForm();
    if(!item.title || !item.summary || !item.content){
        status("أكمل العنوان والملخص ونص الحدث.", "bad");
        return;
    }
    $("publishBtn").disabled = true;
    status("جاري النشر في محرك الأحداث...");
    try {
        await addDoc(collection(db, "events"), item);
        status("تم تسجيل الحدث بنجاح.", "ok");
        clearForm();
        await loadEvents();
    } catch(e) {
        console.error(e);
        status("فشل النشر. تأكد من قواعد قاعدة البيانات (Firestore Rules).", "bad");
    } finally {
        $("publishBtn").disabled = false;
    }
}

async function removeEvent(id){
    if(!confirm("حذف هذا الحدث من Firebase؟")) return;
    try {
        await deleteDoc(doc(db,"events",id));
        status("تم حذف الحدث.","ok");
        await loadEvents();
    } catch(e) {
        console.error(e);
        status("فشل الحذف.","bad");
    }
}

async function loadEvents() {
    const list = $("list");
    list.textContent = "جاري التحميل...";
    try {
        const snap = await getDocs(collection(db, "events"));
        const events = snap.docs.map(d => ({docId: d.id, ...d.data()}));
        events.sort((a,b)=>String(b.date||"").localeCompare(String(a.date||"")));
        $("jsonPreview").textContent = JSON.stringify(events, null, 2);
        
        if(!events.length){
            list.textContent = "لا توجد أحداث مسجلة بعد.";
            return;
        }
        list.innerHTML = events.map(n => `<div class="news-item"><b>${escapeHTML(n.title)}</b><span>${escapeHTML(n.category)} — ${escapeHTML(n.date)}</span><div class="actions"><button class="danger" data-delete="${n.docId}">حذف</button></div></div>`).join("");
        
        list.querySelectorAll("[data-delete]").forEach(btn => btn.addEventListener("click", () => removeEvent(btn.dataset.delete)));
    } catch(e) {
        console.error(e);
        list.textContent = "تعذر تحميل الأحداث من Firebase.";
        status("تعذر تحميل الأحداث. تأكد من صلاحيات الدخول.", "bad");
    }
}

onAuthStateChanged(auth, (user) => {
    if (user) {
        status("جاهز لتسجيل الأحداث.", "ok");
        loadEvents();
        $("publishBtn").addEventListener("click", addEvent);
        $("refreshBtn").addEventListener("click", loadEvents);
        $("clearFormBtn").addEventListener("click", clearForm);
    } else {
        status("غير مصرح لك بالدخول. يرجى تسجيل الدخول كمدير النظام.", "bad");
        $("list").textContent = "يجب تسجيل الدخول لعرض الأحداث.";
    }
});
</script>
</body>
</html>

<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FA Admin | إدارة المنصة</title>
<style>
:root{--navy:#06152b;--blue:#0a2f5e;--gold:#d4af7a;--ink:#0f172a;--line:#e2e8f0}
body{font-family:sans-serif;background:#f8f9fc;margin:0;padding:20px;color:var(--ink)}
.card{background:white;padding:25px;border-radius:24px;border:1px solid var(--line);box-shadow:0 10px 25px rgba(0,0,0,0.05);max-width:800px;margin:20px auto}
h1,h2{color:var(--blue)}
input,textarea{width:100%;padding:12px;margin:8px 0;border:1px solid var(--line);border-radius:12px;box-sizing:border-box}
button{background:var(--gold);color:#000;border:none;padding:12px 24px;border-radius:12px;font-weight:bold;cursor:pointer;margin-top:10px}
.news-item{border-bottom:1px solid var(--line);padding:15px 0;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div class="card">
    <h1>لوحة تحكم FA Media</h1>
    <input id="title" placeholder="عنوان الحدث">
    <input id="summary" placeholder="ملخص الحدث">
    <textarea id="content" placeholder="نص الحدث الكامل" rows="4"></textarea>
    <button id="publishBtn">نشر الحدث في المحرك</button>
</div>
<div class="card">
    <h2>الأحداث المسجلة</h2>
    <div id="list">جاري التحميل...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCybhy84-1-Bkbooqq7lWyszVkOAkkGGAU",
    authDomain: "fa-media-portal.firebaseapp.com",
    projectId: "fa-media-portal",
    storageBucket: "fa-media-portal.firebasestorage.app",
    messagingSenderId: "817175807213",
    appId: "1:817175807213:web:eda206611dd78ce89038e4"
};

const db = getFirestore(initializeApp(firebaseConfig));
const $ = id => document.getElementById(id);

async function loadEvents() {
    const snap = await getDocs(collection(db, "events"));
    $("list").innerHTML = snap.docs.map(d => `<div class="news-item"><span>${d.data().title}</span> <button onclick="deleteDoc(doc(db,'events','${d.id}')); location.reload();">حذف</button></div>`).join("");
}

$("publishBtn").addEventListener("click", async () => {
    await addDoc(collection(db, "events"), {
        title: $("title").value,
        summary: $("summary").value,
        content: $("content").value,
        date: new Date().toISOString().slice(0,10)
    });
    alert("تم النشر!");
    location.reload();
});

loadEvents();
</script>
</body>
</html>

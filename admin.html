<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FA Admin | إدارة الأخبار</title>
<style>
    :root{--navy:#06152b;--blue:#0a2f5e;--gold:#d4af7a;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--ok:#15803d;--bad:#b91c1c}
    body{margin:0;font-family:Tahoma,Arial,sans-serif;background:linear-gradient(180deg,#fff,#f8f9fc);color:var(--ink);line-height:1.7}
    .container{width:min(900px,92vw);margin:auto}
    .header{padding:28px 0;text-align:center}
    .card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:22px;margin:16px 0;box-shadow:0 10px 30px rgba(0,0,0,0.05)}
    input,textarea{width:100%;padding:12px;margin:8px 0;border:1px solid var(--line);border-radius:12px}
    button{background:var(--navy);color:var(--gold);border:none;padding:12px 24px;border-radius:12px;cursor:pointer;font-weight:bold;width:100%}
    .news-item{display:flex;justify-content:space-between;padding:15px;border-bottom:1px solid var(--line);align-items:center}
</style>
</head>
<body>
<div class="container">
    <div class="header"><h1>FA Media Solutions</h1><p>لوحة التحكم الأصلية</p></div>
    <div class="card">
        <input id="title" placeholder="عنوان الخبر">
        <input id="image" placeholder="رابط الصورة">
        <textarea id="summary" placeholder="المحتوى" rows="3"></textarea>
        <button id="publishBtn">نشر الخبر</button>
    </div>
    <div class="card" id="list">جاري تحميل الأخبار...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyCybhy84-1-Bkbooqq7lWyszVkOAkkGGAU", projectId: "fa-media-portal" }));

    async function load() {
        const q = query(collection(db, "news"), orderBy("date", "desc"));
        const snap = await getDocs(q);
        document.getElementById("list").innerHTML = snap.docs.map(d => `
            <div class="news-item">
                <b>${d.data().title || 'بدون عنوان'}</b>
                <button style="width:auto; background:red; color:white" onclick="deleteDoc(doc(db,'news','${d.id}')); location.reload();">حذف</button>
            </div>`).join("");
    }

    document.getElementById("publishBtn").onclick = async () => {
        await addDoc(collection(db, "news"), {
            title: document.getElementById("title").value,
            image: document.getElementById("image").value,
            summary: document.getElementById("summary").value,
            date: new Date().toISOString()
        });
        location.reload();
    };
    load();
</script>
</body>
</html>

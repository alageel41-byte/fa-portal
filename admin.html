<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>FA Admin | إدارة الأخبار</title>
<style>
:root{--navy:#06152b;--gold:#d4af7a;}
body{font-family:Tahoma; background:#f8f9fc; padding:20px; color:var(--navy);}
.card{background:white; padding:20px; border-radius:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1); max-width:600px; margin:auto;}
input, textarea{width:100%; padding:10px; margin:5px 0; border:1px solid #ddd; border-radius:8px;}
button{background:var(--navy); color:var(--gold); border:none; padding:10px; width:100%; font-weight:bold; cursor:pointer;}
</style>
</head>
<body>
<div class="card">
    <h2>إضافة خبر جديد</h2>
    <input id="title" placeholder="العنوان">
    <input id="location" placeholder="مكان الحدث (الموقع)">
    <input id="image" placeholder="رابط الصورة">
    <textarea id="summary" placeholder="المحتوى/الملخص"></textarea>
    <button id="publishBtn">نشر الخبر</button>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
const db = getFirestore(initializeApp({ apiKey: "AIzaSyCybhy84-1-Bkbooqq7lWyszVkOAkkGGAU", projectId: "fa-media-portal" }));

document.getElementById("publishBtn").onclick = async () => {
    await addDoc(collection(db, "news"), {
        title: document.getElementById("title").value,
        location: document.getElementById("location").value, // تم إضافة حقل المكان
        image: document.getElementById("image").value,
        summary: document.getElementById("summary").value,
        date: new Date().toLocaleDateString('ar-SA')
    });
    alert("تم النشر!");
    location.reload();
};
</script>
</body>
</html>

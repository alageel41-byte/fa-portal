<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>FA Admin | لوحة التحكم</title>
<style>
body{font-family:Tahoma,sans-serif;background:#f8f9fc;padding:20px;}
.card{background:white;padding:20px;border-radius:10px;margin-bottom:20px;border:1px solid #ccc;}
input,textarea{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:5px;}
button{background:#d4af7a;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;}
</style>
</head>
<body>
<div style="max-width:800px;margin:auto;">
    <div class="card">
        <h1>إضافة حدث جديد</h1>
        <input id="title" placeholder="العنوان">
        <input id="summary" placeholder="الملخص">
        <textarea id="content" placeholder="النص"></textarea>
        <button id="publishBtn">نشر الحدث</button>
    </div>
    <div class="card">
        <h2>الأحداث المسجلة</h2>
        <div id="list">جاري التحميل...</div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCybhy84-1-Bkbooqq7lWyszVkOAkkGGAU",
    authDomain: "fa-media-portal.firebaseapp.com",
    projectId: "fa-media-portal",
    storageBucket: "fa-media-portal.firebasestorage.app",
    messagingSenderId: "817175807213",
    appId: "1:817175807213:web:eda206611dd78ce89038e4"
};

const db = getFirestore(initializeApp(firebaseConfig));
const $ = id => document.getElementById(id);

async function loadEvents() {
    try {
        const snap = await getDocs(collection(db, "events"));
        $("list").innerHTML = snap.docs.map(d => `<div style="padding:10px; border-bottom:1px solid #eee;">${d.data().title} <button onclick="deleteDoc(doc(db,'events','${d.id}')); location.reload();">حذف</button></div>`).join("");
    } catch(e) { $("list").innerHTML = "خطأ في الاتصال!"; }
}

$("publishBtn").addEventListener("click", async () => {
    await addDoc(collection(db, "events"), {
        title: $("title").value,
        summary: $("summary").value,
        content: $("content").value,
        date: new Date().toISOString().slice(0,10)
    });
    location.reload();
});

loadEvents();
</script>
</body>
</html>
